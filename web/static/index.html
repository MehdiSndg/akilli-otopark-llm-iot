<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akıllı Otopark Yönlendirme — LLM + IoT</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Sol: otopark görünümü -->
    <section class="lot-panel">
      <canvas id="lot"></canvas>
      <div class="legend" id="legend"></div>

      <!-- Analitik kaplama (gizli; "Analitik" butonu açar) -->
      <div class="overlay" id="analytics" hidden>
        <div class="overlay-head">
          <h2>📊 Analitik & Telemetri</h2>
          <button type="button" id="analytics-close" class="x">✕</button>
        </div>
        <div class="overlay-body">
          <div class="metric-row" id="analytics-metrics"></div>
          <div class="chart-block">
            <span class="chart-title">Doluluk — zaman içinde</span>
            <canvas id="chart-time" height="150"></canvas>
          </div>
          <div class="chart-block">
            <span class="chart-title">Bölge doluluk oranları</span>
            <canvas id="chart-sections" height="150"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- Sağ: asistan paneli -->
    <aside class="side">
      <header class="side-head">
        <h1>Otopark Asistanı</h1>
        <p class="subtitle">LLM + IoT akıllı yönlendirme</p>
        <div class="clock" id="clock">—</div>
      </header>

      <div class="stats" id="stats">
        <div class="stat"><span class="num" id="stat-total">—</span><span class="lab">Toplam</span></div>
        <div class="stat occ"><span class="num" id="stat-occ">—</span><span class="lab">Dolu</span></div>
        <div class="stat emp"><span class="num" id="stat-emp">—</span><span class="lab">Boş</span></div>
      </div>

      <!-- IoT sistem durumu: ağ geçidi + sensör filosu + anomali rozeti -->
      <div class="sysrow">
        <span class="pill" id="gateway"><span class="dot"></span> Ağ geçidi</span>
        <span class="pill" id="sensors">📡 —/—</span>
        <span class="pill" id="edge" title="Sensör düğümünde (edge) filtrelenen geçici/gürültü sinyali — merkeze hiç gitmedi">🛡 Edge —</span>
        <button type="button" class="pill alert" id="anomaly-badge" hidden>⚠ <span id="anomaly-count">0</span></button>
      </div>
      <div class="anomaly-list" id="anomaly-list" hidden></div>

      <div class="entrance-sel" id="entrance-sel">
        <span class="field-label">Giriş kapısı</span>
        <div class="seg" id="seg"></div>
      </div>

      <div class="actions">
        <button type="button" id="multi" class="act-btn">🚗 Aynı anda 3 araç</button>
        <button type="button" id="predict-btn" class="act-btn">🔮 Tahmin</button>
        <button type="button" id="analytics-btn" class="act-btn">📊 Analitik</button>
        <button type="button" id="heatmap-btn" class="act-btn">🔥 Isı haritası</button>
      </div>

      <div class="chat" id="chat"></div>

      <form class="composer" id="composer">
        <button type="button" id="mic" class="mic-btn" title="Sesle söyle">🎤</button>
        <input id="msg" type="text" autocomplete="off"
               placeholder="Örn: Elektrikli arabam var, çıkışa yakın bir yer...">
        <button type="submit" id="send">Gönder</button>
      </form>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
